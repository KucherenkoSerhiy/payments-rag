# Retrieval golden set — the ground truth for the recall@k eval.
#
# Each entry: a real question + the page(s) whose text actually ANSWERS it.
# YOU label the pages with domain knowledge — the eval is only as good as this
# file (a biased or tiny set gives a meaningless number; see ADR-0012).
#
# How to label one question:
#   1. Find candidates:  uv run python -m payments_rag.cli query "your question"
#   2. Open the cited PDF page(s) in corpus/raw/ and CONFIRM the text truly
#      answers it. Retrieval candidates are hints, NOT ground truth — verify.
#   3. Put the confirmed source + page number(s) in answer_pages.
#
# Aim for ~10-15 entries, DIVERSE in theme (timing, availability, message
# datasets, returns, charges, definitions) — not all one topic.

- id: sct-inst-max-execution-time
  question: "What is the target maximum execution time for an SCT Inst payment?"
  answer_pages:
    - source: sct_inst_rulebook_2025.pdf
      pages: [26]   # verified: "Target maximum execution time: Latest at 5 seconds after the Time Stamp"

- id: sct-inst-availability
  question: "Is the SCT Inst scheme available on weekends and public holidays?"
  answer_pages:
    - source: sct_inst_rulebook_2025.pdf
      pages: [17]   # verified: "available 24 hours a day and on all Calendar Days of the year"

- id: sct-max-execution-time
  question: "What is the maximum execution time for a standard (non-instant) SCT?"
  answer_pages:
    - source: sct_rulebook_2025.pdf
      pages: []     # TODO: candidate pages 18 / 27 (term appears there) — verify which states it

