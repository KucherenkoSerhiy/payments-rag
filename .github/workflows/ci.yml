name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
          POSTGRES_DB: payments_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://payments:payments@127.0.0.1:5432/payments_rag
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Apply DB schema
        run: psql "$DATABASE_URL" -f infra/init.sql
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q
      # Note: the paid answer-eval (LLM-as-judge) is not run in CI. It needs the
      # licensed corpus indexed and spends real API budget. Run it locally.

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
