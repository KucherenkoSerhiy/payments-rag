name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
          POSTGRES_DB: payments_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # config.py resolves each value: env var (here) -> .env (local only,
      # gitignored) -> hardcoded default. Only DATABASE_URL needs overriding for
      # CI, to point at the service container above. No API keys are set because
      # the tests are pure or monkeypatch the LLM/embedding calls -- nothing hits
      # Anthropic/OpenAI, and the key checks (require_*_key) are lazy.
      #
      # If a future job makes real API calls, add repo secrets and reference them:
      #   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: postgresql://payments:payments@127.0.0.1:5432/payments_rag
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Apply DB schema
        run: psql "$DATABASE_URL" -f infra/init.sql
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q
      # Note: the paid answer-eval (LLM-as-judge) is not run in CI — it needs the
      # licensed corpus indexed and spends real API budget. Run it locally.

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
